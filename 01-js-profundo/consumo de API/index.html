<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex API</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>

<body class="bg-light">
    <header class="container py-4">
        <h1 class="text-center mb-4">Pokédex</h1>
        <nav class="nav d-flex flex-wrap gap-2 justify-content-center">
            <button class="btn btn-outline-secondary btn-types btn-types-all" id="all">Ver todos</button>
            <button class="btn btn-outline-secondary btn-types btn-types-normal" id="normal">Normal</button>
            <button class="btn btn-outline-secondary btn-types btn-types-fire" id="fire">Fire</button>
            <button class="btn btn-outline-secondary btn-types btn-types-water" id="water">Water</button>
            <button class="btn btn-outline-secondary btn-types btn-types-grass" id="grass">Grass</button>
            <button class="btn btn-outline-secondary btn-types btn-types-electric" id="electric">Electric</button>
            <button class="btn btn-outline-secondary btn-types btn-types-ice" id="ice">Ice</button>
            <button class="btn btn-outline-secondary btn-types btn-types-fighting" id="fighting">Fighting</button>
            <button class="btn btn-outline-secondary btn-types btn-types-poison" id="poison">Poison</button>
            <button class="btn btn-outline-secondary btn-types btn-types-ground" id="ground">Ground</button>
            <button class="btn btn-outline-secondary btn-types btn-types-flying" id="flying">Flying</button>
            <button class="btn btn-outline-secondary btn-types btn-types-psychic" id="psychic">Psychic</button>
            <button class="btn btn-outline-secondary btn-types btn-types-bug" id="bug">Bug</button>
            <button class="btn btn-outline-secondary btn-types btn-types-rock" id="rock">Rock</button>
            <button class="btn btn-outline-secondary btn-types btn-types-ghost" id="ghost">Ghost</button>
            <button class="btn btn-outline-secondary btn-types btn-types-dragon" id="dragon">Dragon</button>
            <button class="btn btn-outline-secondary btn-types btn-types-dark" id="dark">Dark</button>
            <button class="btn btn-outline-secondary btn-types btn-types-steel" id="steel">Steel</button>
            <button class="btn btn-outline-secondary btn-types btn-types-fairy" id="fairy">Fairy</button>
        </nav>
    </header>

    <main class="container py-4 d-flex flex-wrap gap-4 justify-content-center" id="pokemon-container">
        <!-- Contenido generado por JS -->
    </main>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom Script -->
    <script src="index.js"></script>
</body>

</html>
